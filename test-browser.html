<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test ElevenLabs Voice</title>
</head>
<body>
  <h1>ElevenLabs Voice Test</h1>
  <button id="testTTS">Test TTS (Lucy)</button>
  <button id="testSTT">Test STT (录音)</button>
  <div id="status"></div>
  <div id="result"></div>

  <script type="module">
    import { createVoice } from './agentic-voice.js'

    const status = document.getElementById('status')
    const result = document.getElementById('result')

    const voice = createVoice({
      tts: {
        provider: 'elevenlabs',
        apiKey: 'sk_b0f355a25dea64a975f9aef7ad791a19c4f5e266143caecc',
        voice: 'jsCqWAovK2LkecY7zXl4',  // Lucy
        model: 'eleven_turbo_v2_5',
      },
      stt: {
        provider: 'elevenlabs',
        apiKey: 'sk_b0f355a25dea64a975f9aef7ad791a19c4f5e266143caecc',
        model: 'scribe_v2',
      }
    })

    voice.on('transcript', text => {
      result.textContent = 'Transcript: ' + text
    })

    voice.on('error', err => {
      result.textContent = 'Error: ' + err.message
    })

    document.getElementById('testTTS').onclick = async () => {
      try {
        console.log('[Test] Starting TTS test...')
        status.textContent = 'Speaking...'
        
        voice.unlock()
        console.log('[Test] Voice unlocked')
        
        console.log('[Test] Calling voice.speak()...')
        const success = await voice.speak('Hello, this is Lucy speaking from ElevenLabs.')
        console.log('[Test] voice.speak() returned:', success)
        
        if (success) {
          status.textContent = 'Done!'
        } else {
          status.textContent = 'Speak failed'
        }
      } catch (e) {
        status.textContent = 'Error: ' + e.message
        console.error('[Test] Error:', e)
      }
    }

    document.getElementById('testSTT').onclick = () => {
      status.textContent = 'Recording... (hold button)'
      voice.startListening()
    }

    document.getElementById('testSTT').onmouseup = () => {
      voice.stopListening()
      status.textContent = 'Processing...'
    }
  </script>
</body>
</html>
